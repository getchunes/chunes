name: Sign and release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version from version.py
        required: true
        default: 1.0.0
        type: string
      confirm_v1_recreation:
        description: I removed the zero-download v1.0.0 release and tag immediately before this final recreation
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: stable-release
  cancel-in-progress: false

jobs:
  build:
    name: Build unsigned signing input
    runs-on: windows-2022
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      CONFIRM_V1_RECREATION: ${{ inputs.confirm_v1_recreation }}
    outputs:
      signing_input_id: ${{ steps.upload-signing-input.outputs.artifact-id }}
    steps:
      - name: Require main and explicit recreation confirmation
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -ne "refs/heads/main") {
            throw "Stable releases must be dispatched from main"
          }
          if ($env:RELEASE_VERSION -notmatch '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$') {
            throw "Release version must be a stable semantic version"
          }
          if ($env:RELEASE_VERSION -eq "1.0.0" -and $env:CONFIRM_V1_RECREATION -ne "true") {
            throw "Recreating v1.0.0 requires explicit confirmation"
          }

      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"
          architecture: x64
          cache: pip
          cache-dependency-path: requirements-windows-py313.lock

      - name: Match source version
        shell: pwsh
        run: |
          $sourceVersion = (python -c "from version import __version__; print(__version__)").Trim()
          if ($sourceVersion -ne $env:RELEASE_VERSION) {
            throw "Requested $env:RELEASE_VERSION but source is $sourceVersion"
          }

      - name: Require unused release tag
        shell: pwsh
        run: |
          $tag = "v$env:RELEASE_VERSION"
          git ls-remote --exit-code --tags origin "refs/tags/$tag" | Out-Null
          $tagCheckExit = $LASTEXITCODE
          if ($tagCheckExit -eq 0) {
            throw "Release tag $tag already exists"
          }
          if ($tagCheckExit -ne 2) {
            throw "Could not check whether release tag $tag exists"
          }

      - name: Install hash-locked dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements-windows-py313.lock

      - name: Test
        run: |
          python -m pip check
          python -m compileall -q chunes.py presence.py protocol.py settings.py updater.py version.py tests
          python -m unittest discover -s tests -v

      - name: Get hash-locked WiX Toolset
        shell: pwsh
        run: |
          $wixBin = (& .\scripts\get-wix.ps1 -Destination (Join-Path $env:RUNNER_TEMP "wix-3.14.1")).Trim()
          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build signing input
        shell: pwsh
        run: .\scripts\build.ps1 -WixBin $env:WIX_BIN

      - name: Upload short-lived SignPath input
        id: upload-signing-input
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signpath-input-${{ github.run_id }}
          path: dist/Chunes-${{ inputs.version }}-x64.msi
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  sign:
    name: Sign and verify MSI
    needs: build
    runs-on: windows-2022
    timeout-minutes: 30
    environment: code-signing
    permissions:
      actions: read
      contents: read
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    outputs:
      signed_sha256: ${{ steps.verify-signed.outputs.signed_sha256 }}
    steps:
      - name: Check out verification source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"
          architecture: x64

      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ needs.build.outputs.signing_input_id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          output-artifact-directory: signed
          parameters: |
            version: ${{ toJSON(inputs.version) }}

      - name: Verify signed release artifact
        id: verify-signed
        shell: pwsh
        run: |
          $name = "Chunes-$env:RELEASE_VERSION-x64.msi"
          $matches = @(Get-ChildItem -LiteralPath "signed" -Recurse -File | Where-Object Name -eq $name)
          if ($matches.Count -ne 1) {
            throw "SignPath output must contain exactly one $name"
          }
          $path = $matches[0].FullName
          $env:CHUNES_SIGNED_MSI = $path
          python -c "import os; from updater import verify_authenticode, verify_msi_identity; p=os.environ['CHUNES_SIGNED_MSI']; verify_authenticode(p, 'SignPath Foundation'); verify_msi_identity(p, os.environ['RELEASE_VERSION'])"
          if ($LASTEXITCODE -ne 0) {
            throw "Signed MSI did not pass the updater trust and identity policy"
          }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLowerInvariant()
          "path=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "signed_sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload verified signed artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-release-${{ github.run_id }}
          path: ${{ steps.verify-signed.outputs.path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    name: Publish signed stable release
    needs: sign
    runs-on: windows-2022
    timeout-minutes: 10
    environment: stable-release
    permissions:
      actions: read
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Check out verification source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"
          architecture: x64

      - name: Download verified signed artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: signed-release-${{ github.run_id }}
          path: signed-release

      - name: Reverify publication artifact
        shell: pwsh
        run: |
          $name = "Chunes-$env:RELEASE_VERSION-x64.msi"
          $matches = @(Get-ChildItem -LiteralPath "signed-release" -Recurse -File | Where-Object Name -eq $name)
          if ($matches.Count -ne 1) {
            throw "Publication input must contain exactly one $name"
          }
          $path = $matches[0].FullName
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLowerInvariant()
          if ($hash -cne "${{ needs.sign.outputs.signed_sha256 }}") {
            throw "Signed artifact changed between signing and publication"
          }
          $env:CHUNES_SIGNED_MSI = $path
          python -c "import os; from updater import verify_authenticode, verify_msi_identity; p=os.environ['CHUNES_SIGNED_MSI']; verify_authenticode(p, 'SignPath Foundation'); verify_msi_identity(p, os.environ['RELEASE_VERSION'])"
          if ($LASTEXITCODE -ne 0) {
            throw "Publication MSI did not pass the updater trust and identity policy"
          }
          "SIGNED_MSI=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Recheck unused release tag
        shell: pwsh
        run: |
          $tag = "v$env:RELEASE_VERSION"
          git ls-remote --exit-code --tags origin "refs/tags/$tag" | Out-Null
          $tagCheckExit = $LASTEXITCODE
          if ($tagCheckExit -eq 0) {
            throw "Release tag $tag appeared during signing"
          }
          if ($tagCheckExit -ne 2) {
            throw "Could not recheck release tag $tag"
          }

      - name: Publish signed stable release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:RELEASE_VERSION"
          $notes = @"
          Code signing policy: https://github.com/getchunes/chunes#code-signing-policy

          Privacy policy: https://github.com/getchunes/chunes/blob/main/PRIVACY.md

          The only binary attached to this release was signed by SignPath and verified as published by SignPath Foundation before publication.
          "@
          gh release create $tag $env:SIGNED_MSI --target $env:GITHUB_SHA --title "Chunes $env:RELEASE_VERSION" --generate-notes --notes $notes
