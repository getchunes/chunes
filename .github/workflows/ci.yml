name: Windows CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.14"
          architecture: x64
          cache: pip
          cache-dependency-path: requirements-windows-py313.lock

      - name: Install hash-locked dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements-windows-py313.lock

      - name: Test
        run: |
          python -m pip check
          python -m compileall -q chunes.py presence.py protocol.py settings.py updater.py version.py tests
          python -m unittest discover -s tests -v

      - name: Get hash-locked WiX Toolset
        shell: pwsh
        run: |
          $wixBin = (& .\scripts\get-wix.ps1 -Destination (Join-Path $env:RUNNER_TEMP "wix-3.14.1")).Trim()
          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build x64 executable and MSI
        shell: pwsh
        run: .\scripts\build.ps1 -WixBin $env:WIX_BIN

      - name: Verify build metadata
        shell: pwsh
        run: |
          $version = (python -c "from version import __version__; print(__version__)").Trim()
          if ($version -notmatch '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$') {
            throw "version.py does not contain a stable semantic version"
          }
          $fileVersion = "$version.0"
          $exe = Get-Item -LiteralPath "dist\Chunes.exe"
          $expectedMetadata = @{
            ProductName = "Chunes"
            ProductVersion = $fileVersion
            FileVersion = $fileVersion
            CompanyName = "Chunes"
            OriginalFilename = "Chunes.exe"
          }
          foreach ($name in $expectedMetadata.Keys) {
            if ($exe.VersionInfo.$name -cne $expectedMetadata[$name]) {
              throw "Unexpected executable $name`: $($exe.VersionInfo.$name)"
            }
          }

          $msi = "dist\Chunes-$version-x64.msi"
          if (-not (Test-Path -LiteralPath $msi -PathType Leaf)) {
            throw "Expected MSI was not produced: $msi"
          }
          $env:CHUNES_CI_VERSION = $version
          $env:CHUNES_CI_MSI = (Resolve-Path -LiteralPath $msi).Path
          python -c "import os; from updater import verify_msi_identity; verify_msi_identity(os.environ['CHUNES_CI_MSI'], os.environ['CHUNES_CI_VERSION'])"
          if ($LASTEXITCODE -ne 0) {
            throw "MSI identity verification failed"
          }

          foreach ($path in @($exe.FullName, $env:CHUNES_CI_MSI)) {
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::NotSigned) {
              throw "Normal CI output must be unsigned: $path ($($signature.Status))"
            }
          }
