name: Windows CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"
          architecture: x64
          cache: pip
          cache-dependency-path: requirements-windows-py313.lock

      - name: Install hash-locked dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements-windows-py313.lock

      - name: Test
        run: |
          python -m pip check
          python -m compileall -q chunes.py presence.py protocol.py settings.py updater.py version.py tests
          python -m unittest discover -s tests -v

      - name: Get hash-locked WiX Toolset
        shell: pwsh
        run: |
          $wixBin = (& .\scripts\get-wix.ps1 -Destination (Join-Path $env:RUNNER_TEMP "wix-3.14.1")).Trim()
          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build x64 executable and MSI
        shell: pwsh
        run: .\scripts\build.ps1 -WixBin $env:WIX_BIN

      - name: Verify build metadata
        shell: pwsh
        run: |
          $exe = Get-Item -LiteralPath "dist\Chunes.exe"
          if ($exe.VersionInfo.ProductVersion -ne "1.0.0.0") {
            throw "Unexpected executable version: $($exe.VersionInfo.ProductVersion)"
          }
          if (-not (Test-Path -LiteralPath "dist\Chunes-1.0.0-x64.msi")) {
            throw "Versioned MSI was not produced"
          }
