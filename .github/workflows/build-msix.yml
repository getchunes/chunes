name: Build MSIX package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from version.py
        required: true
        default: 1.0.8
        type: string
  workflow_run:
    workflows: ["Sign and release", "Publish unsigned manual release"]
    types:
      - completed

permissions: {}

concurrency:
  group: build-msix
  cancel-in-progress: false

jobs:
  build:
    name: Build MSIX package
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: windows-2022
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Require main branch on manual dispatch
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and $env:GITHUB_REF -cne "refs/heads/main") {
            throw "MSIX builds must be dispatched from main"
          }

      - name: Check out source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build MSIX package
        shell: pwsh
        run: |
          .\scripts\build-msix.ps1

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chunes-MSIX-Package
          path: dist/*.msix
          if-no-files-found: error
