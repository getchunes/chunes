name: Publish unsigned manual release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from version.py
        required: true
        default: 1.0.1
        type: string
      confirm_unsigned:
        description: Publish an unsigned manual-only prerelease
        required: true
        default: false
        type: boolean

permissions: {}

concurrency:
  group: stable-release
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify unsigned MSI
    runs-on: windows-2022
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CONFIRM_UNSIGNED: ${{ inputs.confirm_unsigned }}
      RELEASE_VERSION: ${{ inputs.version }}
    outputs:
      unsigned_sha256: ${{ steps.verify-unsigned.outputs.sha256 }}
    steps:
      - name: Require main and explicit unsigned confirmation
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -cne "refs/heads/main") {
            throw "Unsigned releases must be dispatched from main"
          }
          if ($env:CONFIRM_UNSIGNED -cne "true") {
            throw "Unsigned manual publication was not explicitly confirmed"
          }
          if ($env:RELEASE_VERSION -notmatch '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$') {
            throw "Release version must be a stable semantic version"
          }
          if ([version]$env:RELEASE_VERSION -lt [version]"1.0.1") {
            throw "Release version must be newer than immutable v1.0.0"
          }

      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"
          architecture: x64
          cache: pip
          cache-dependency-path: requirements-windows-py313.lock

      - name: Match source version and require unused tag
        shell: pwsh
        run: |
          $sourceVersion = (python -c "from version import __version__; print(__version__)").Trim()
          if ($sourceVersion -cne $env:RELEASE_VERSION) {
            throw "Requested $env:RELEASE_VERSION but source is $sourceVersion"
          }
          $tag = "v$env:RELEASE_VERSION"
          $tagRefs = @(git ls-remote --tags origin "refs/tags/$tag")
          if ($LASTEXITCODE -ne 0) {
            throw "Could not check whether release tag $tag exists"
          }
          if ($tagRefs.Count -ne 0) {
            throw "Release tag $tag already exists"
          }

      - name: Install hash-locked dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements-windows-py313.lock

      - name: Test
        run: |
          python -m pip check
          python -m compileall -q chunes.py presence.py protocol.py settings.py updater.py version.py tests
          python -m unittest discover -s tests -v

      - name: Get hash-locked WiX Toolset
        shell: pwsh
        run: |
          $wixBin = (& .\scripts\get-wix.ps1 -Destination (Join-Path $env:RUNNER_TEMP "wix-3.14.1")).Trim()
          "WIX_BIN=$wixBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build unsigned manual-release MSI
        shell: pwsh
        run: |
          Remove-Item -LiteralPath "build", "dist" -Recurse -Force -ErrorAction SilentlyContinue
          .\scripts\build.ps1 -WixBin $env:WIX_BIN -UnsignedManualRelease

      - name: Verify exact unsigned build
        id: verify-unsigned
        shell: pwsh
        run: |
          $expectedFileVersion = "$env:RELEASE_VERSION.0"
          $exe = Get-Item -LiteralPath "dist\Chunes.exe"
          $expectedMetadata = @{
            ProductName = "Chunes"
            ProductVersion = $expectedFileVersion
            FileVersion = $expectedFileVersion
            CompanyName = "Chunes"
            OriginalFilename = "Chunes.exe"
          }
          foreach ($name in $expectedMetadata.Keys) {
            if ($exe.VersionInfo.$name -cne $expectedMetadata[$name]) {
              throw "Unexpected executable $name`: $($exe.VersionInfo.$name)"
            }
          }

          $expectedName = "Chunes-$env:RELEASE_VERSION-x64.msi"
          $msiFiles = @(Get-ChildItem -LiteralPath "dist" -File -Filter "*.msi")
          if ($msiFiles.Count -ne 1 -or $msiFiles[0].Name -cne $expectedName) {
            throw "Build must produce exactly $expectedName"
          }
          $msi = $msiFiles[0].FullName
          $env:CHUNES_UNSIGNED_MSI = $msi
          python -c "import os; from updater import verify_msi_identity; verify_msi_identity(os.environ['CHUNES_UNSIGNED_MSI'], os.environ['RELEASE_VERSION'])"
          if ($LASTEXITCODE -ne 0) {
            throw "Unsigned MSI identity verification failed"
          }

          $extract = Join-Path $env:RUNNER_TEMP "unsigned-msi-extracted"
          Remove-Item -LiteralPath $extract -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $extract | Out-Null
          & (Join-Path $env:WIX_BIN "dark.exe") -nologo -x $extract -o (Join-Path $extract "package.wxs") $msi
          if ($LASTEXITCODE -ne 0) {
            throw "Could not safely extract the unsigned MSI"
          }
          [xml]$decompiled = Get-Content -LiteralPath (Join-Path $extract "package.wxs") -Raw
          $namespace = New-Object System.Xml.XmlNamespaceManager($decompiled.NameTable)
          $namespace.AddNamespace("w", "http://schemas.microsoft.com/wix/2006/wi")
          $payloads = @($decompiled.SelectNodes("//w:File[@Name='Chunes.exe']", $namespace))
          if ($payloads.Count -ne 1 -or $payloads[0].Id -cne "ChunesExe") {
            throw "Unsigned MSI must map exactly one ChunesExe payload to Chunes.exe"
          }
          $warnings = @($decompiled.SelectNodes("//w:Dialog[@Id='UnsignedWarningDlg']", $namespace))
          if ($warnings.Count -ne 1) {
            throw "Unsigned manual MSI must contain its installer warning"
          }
          $embeddedExe = Get-Item -LiteralPath (Join-Path $extract "File\ChunesExe")
          if ((Get-FileHash -Algorithm SHA256 -LiteralPath $embeddedExe).Hash -cne (Get-FileHash -Algorithm SHA256 -LiteralPath $exe).Hash) {
            throw "Unsigned MSI does not contain the exact freshly built Chunes.exe"
          }
          foreach ($path in @($exe.FullName, $embeddedExe.FullName, $msi)) {
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::NotSigned) {
              throw "Unsigned output must be NotSigned: $path ($($signature.Status))"
            }
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $msi).Hash.ToLowerInvariant()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "path=$msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "Unsigned MSI SHA-256: $hash" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload exact one-day unsigned MSI
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-release-${{ github.run_id }}
          path: ${{ steps.verify-unsigned.outputs.path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    name: Publish immutable unsigned manual prerelease
    needs: build
    runs-on: windows-2022
    timeout-minutes: 15
    environment: unsigned-manual-release
    permissions:
      actions: read
      contents: write
    env:
      CONFIRM_UNSIGNED: ${{ inputs.confirm_unsigned }}
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Require dispatch from main
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -cne "refs/heads/main" -or $env:CONFIRM_UNSIGNED -cne "true") {
            throw "Unsigned manual release context is invalid"
          }

      - name: Check out verification source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.14"
          architecture: x64

      - name: Download verified unsigned MSI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: unsigned-release-${{ github.run_id }}
          path: unsigned-release

      - name: Rehash and reverify publication MSI
        shell: pwsh
        run: |
          $expectedName = "Chunes-$env:RELEASE_VERSION-x64.msi"
          $files = @(Get-ChildItem -LiteralPath "unsigned-release" -Recurse -File)
          if ($files.Count -ne 1 -or $files[0].Name -cne $expectedName) {
            throw "Publication input must contain only $expectedName"
          }
          $msi = $files[0].FullName
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $msi).Hash.ToLowerInvariant()
          if ($hash -cne "${{ needs.build.outputs.unsigned_sha256 }}") {
            throw "Unsigned MSI changed between build and publication"
          }
          $env:CHUNES_UNSIGNED_MSI = $msi
          python -c "import os; from updater import verify_msi_identity; verify_msi_identity(os.environ['CHUNES_UNSIGNED_MSI'], os.environ['RELEASE_VERSION'])"
          if ($LASTEXITCODE -ne 0) {
            throw "Publication MSI identity verification failed"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $msi
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::NotSigned) {
            throw "Publication MSI must remain NotSigned, not $($signature.Status)"
          }
          "UNSIGNED_MSI=$msi" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "UNSIGNED_SHA256=$hash" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Require unused release identity and snapshot latest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiVersion = "2026-03-10"
          $tag = "v$env:RELEASE_VERSION"
          $releasePages = gh api --paginate --slurp -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Could not check existing releases"
          }
          $releaseMatches = @($releasePages | ForEach-Object { $_ } | Where-Object { $_.tag_name -ceq $tag })
          if ($releaseMatches.Count -ne 0) {
            throw "A release for $tag already exists"
          }
          foreach ($existing in @($releasePages | ForEach-Object { $_ })) {
            if ($existing.tag_name -match '^v(\d+\.\d+\.\d+)$' -and [version]$Matches[1] -ge [version]$env:RELEASE_VERSION) {
              throw "Release version must be newer than existing $($existing.tag_name)"
            }
          }
          $tagRefs = @(git ls-remote --tags origin "refs/tags/$tag")
          if ($LASTEXITCODE -ne 0 -or $tagRefs.Count -ne 0) {
            throw "Release tag $tag already exists or could not be checked"
          }
          $latest = gh api -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases/latest" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $latest.id) {
            throw "Could not snapshot the current automatic-release channel"
          }
          "PREVIOUS_LATEST_ID=$($latest.id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Atomically create and verify exact tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiVersion = "2026-03-10"
          $tag = "v$env:RELEASE_VERSION"
          $fullRef = "refs/tags/$tag"
          gh api --method POST -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/git/refs" -f "ref=$fullRef" -f "sha=$env:GITHUB_SHA" | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Could not atomically create $fullRef"
          }
          $ref = gh api -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $ref.ref -cne $fullRef -or $ref.object.type -cne "commit" -or $ref.object.sha -cne $env:GITHUB_SHA) {
            throw "Created tag does not point exactly to GITHUB_SHA"
          }

      - name: Create prerelease draft and upload only the unsigned MSI
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiVersion = "2026-03-10"
          $tag = "v$env:RELEASE_VERSION"
          $notes = @"
          # UNSIGNED MANUAL RELEASE - UNKNOWN PUBLISHER

          **This Chunes MSI is intentionally unsigned. Windows will display Unknown publisher. It is a manual download and is not offered by the in-app updater.**

          **SHA-256: $env:UNSIGNED_SHA256**

          The MSI and tag become immutable when published. A matching checksum verifies byte equality with this GitHub asset; it is not Authenticode publisher identity and does not make the MSI signed.

          Privacy policy: https://github.com/getchunes/chunes/blob/main/PRIVACY.md
          "@
          $release = gh api --method POST -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases" -f "tag_name=$tag" -f "target_commitish=$env:GITHUB_SHA" -f "name=Chunes $env:RELEASE_VERSION - UNSIGNED MANUAL" -f "body=$notes" -F draft=true -F prerelease=true -f make_latest=false | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $release.id) {
            throw "Could not create the draft unsigned prerelease"
          }
          gh release upload $tag $env:UNSIGNED_MSI
          if ($LASTEXITCODE -ne 0) {
            throw "Could not upload the unsigned MSI without clobbering"
          }
          "RELEASE_ID=$($release.id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify draft asset and GitHub digest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiVersion = "2026-03-10"
          $release = gh api -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases/$env:RELEASE_ID" | ConvertFrom-Json
          $expectedName = "Chunes-$env:RELEASE_VERSION-x64.msi"
          if ($LASTEXITCODE -ne 0 -or $release.draft -ne $true -or $release.prerelease -ne $true) {
            throw "Release is not the expected unsigned prerelease draft"
          }
          if ($release.assets.Count -ne 1 -or $release.assets[0].name -cne $expectedName -or $release.assets[0].digest -cne "sha256:$env:UNSIGNED_SHA256") {
            throw "GitHub's uploaded asset digest or identity does not match the unsigned MSI"
          }

      - name: Reverify tag and publish without changing latest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiVersion = "2026-03-10"
          $tag = "v$env:RELEASE_VERSION"
          $ref = gh api -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $ref.ref -cne "refs/tags/$tag" -or $ref.object.type -cne "commit" -or $ref.object.sha -cne $env:GITHUB_SHA) {
            throw "Release tag changed before publication"
          }
          gh api --method PATCH -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases/$env:RELEASE_ID" -F draft=false -F prerelease=true -f make_latest=false | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Could not publish the unsigned manual prerelease"
          }

      - name: Require immutable prerelease and unchanged automatic channel
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $apiVersion = "2026-03-10"
          $release = gh api -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases/$env:RELEASE_ID" | ConvertFrom-Json
          $expectedName = "Chunes-$env:RELEASE_VERSION-x64.msi"
          if ($LASTEXITCODE -ne 0 -or $release.draft -ne $false -or $release.prerelease -ne $true -or $release.immutable -ne $true) {
            throw "Published unsigned release is not an immutable prerelease"
          }
          if ($release.assets.Count -ne 1 -or $release.assets[0].name -cne $expectedName -or $release.assets[0].digest -cne "sha256:$env:UNSIGNED_SHA256") {
            throw "Immutable unsigned release asset changed"
          }
          $latest = gh api -H "X-GitHub-Api-Version: $apiVersion" "repos/$env:GITHUB_REPOSITORY/releases/latest" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $latest.id -ne [long]$env:PREVIOUS_LATEST_ID) {
            throw "Unsigned prerelease changed the automatic update channel"
          }
